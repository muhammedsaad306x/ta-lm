  <body style="margin: 0; padding: 0; background-color: #f9f9f9 !important; overflow-x: hidden;">
    <!-- OPTIMIZATION: Prevent white page flash - Set background color immediately -->
    <!-- This ensures users see a colored background instead of white while React loads -->
    <style>
      /* Prevent white flash - apply background immediately */
      html {
        margin: 0;
        padding: 0;
        background-color: #f9f9f9 !important;
        overflow-x: hidden;
        /* OPTIMIZATION: Ensure html is visible immediately - no white flash */
        opacity: 1;
        visibility: visible;
      }
      body {
        margin: 0;
        padding: 0;
        background-color: #f9f9f9 !important;
        overflow-x: hidden;
        /* OPTIMIZATION: Ensure body is visible immediately - no white flash */
        opacity: 1;
        visibility: visible;
      }
      #root {
        background-color: #f9f9f9;
        /* OPTIMIZATION: Ensure root is visible immediately to prevent white flash */
        opacity: 1;
        visibility: visible;
        position: relative;
      }
      /* ✅ FIX: REMOVED #root:empty::before - causes flash during hydration */
      /* React temporarily empties nodes during hydration, triggering this pseudo-element */
      /* We already have loader overlay + root background + body background - no need for this */
      /* ✅ FIX: Bulletproof loader CSS - industry standard pattern */
      /* Stay in DOM, fade opacity only, use pointer-events: none */
      #initial-loading {
        position: fixed;
        inset: 0;
        width: 100vw;
        height: 100dvh;
        background-color: #0a4976;
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 99999;
        opacity: 1;
        visibility: visible;
        pointer-events: auto;
        transition: opacity 0.4s ease-out, background-color 0.4s ease-out;
        will-change: opacity;
      }
      /* When hidden - fade to page background so we never reveal empty/white root */
      #initial-loading[data-hidden="true"] {
        opacity: 0;
        pointer-events: none;
        visibility: visible;
        background-color: #f9f9f9; /* Match body - smooth blue→gray, no white flash */
      }
      @keyframes scalePulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.05); }
      }
      .initial-loading-logo {
        width: 331px;
        height: 363px;
        object-fit: contain;
        filter: brightness(0) invert(1);
        animation: scalePulse 1.5s ease-in-out infinite;
        transform-origin: center;
        display: block;
      }
      @media (max-width: 768px) {
        .initial-loading-logo {
          width: 200px;
          height: 220px;
        }
      }
